name: Render & Validate SCAD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install OpenSCAD
        run: sudo apt-get update && sudo apt-get install -y openscad
      
      - name: Render PNG preview
        run: openscad -o ghost_preview.png --render ghost_cup.scad
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: renders
          path: ghost_preview.png