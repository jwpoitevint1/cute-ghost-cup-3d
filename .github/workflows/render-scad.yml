name: Render & Validate SCAD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install OpenSCAD
        run: sudo apt-get update && sudo apt-get install -y openscad
      
      - name: Render PNG preview
        run: openscad -o ghost_preview.png --render=full --autocenter --viewall --imgsize=800,600 --camera=0,0,0,55,0,25,300 ghost_cup.scad

      - name: Export STL
        run: openscad -o ghost_cup.stl --export-format=binstl ghost_cup.scad
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: renders-and-stl
          path: |
            ghost_preview.png
            ghost_cup.stl